<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大楠屋くす玉</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; background: #f5f0e8; font-family: sans-serif;
  user-select: none; overflow: hidden;
}
#confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 100;
}
.stage { display: flex; flex-direction: column; align-items: center; position: relative; }
.ceiling-rope {
  width: 4px; height: 60px;
  background: linear-gradient(to right, #8B6914 30%, #C8A84B 50%, #8B6914 70%);
  border-radius: 2px; flex-shrink: 0;
}
.kusudama-area { position: relative; width: 240px; height: 240px; flex-shrink: 0; }
.half { position: absolute; top: 0; width: 120px; height: 240px; overflow: hidden; will-change: transform; }
.left-half  { left: 0; }
.right-half { left: 120px; }
.half-inner { position: absolute; top: 0; width: 240px; height: 240px; }
.left-half  .half-inner { left: 0; }
.right-half .half-inner { left: -120px; }
.left-half.open-left {
  transition: transform 0.7s cubic-bezier(0.22,1,0.36,1);
  transform: translateX(-150px) rotate(-25deg);
}
.right-half.open-right {
  transition: transform 0.7s cubic-bezier(0.22,1,0.36,1);
  transform: translateX(150px) rotate(25deg);
}
@keyframes shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-8px); }
  40%  { transform: translateX(8px); }
  60%  { transform: translateX(-5px); }
  80%  { transform: translateX(5px); }
  100% { transform: translateX(0); }
}
.kusudama-area.shaking { animation: shake 0.35s ease; }
.chara-wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0) rotate(-10deg);
  width: 220px; height: 220px; z-index: 30;
  pointer-events: none;
  transition: transform 0.55s cubic-bezier(0.34, 1.6, 0.64, 1) 0.2s;
}
.chara-wrap.show { transform: translate(-50%, -60%) scale(1.1) rotate(0deg); }
.chara-wrap img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.3)); }
.rope-pull-area {
  display: flex; flex-direction: column; align-items: center;
  cursor: grab; touch-action: none; z-index: 50; flex-shrink: 0;
}
.rope-pull-area:active { cursor: grabbing; }
.pull-rope {
  width: 4px;
  background: linear-gradient(to right, #8B6914 30%, #C8A84B 50%, #8B6914 70%);
  border-radius: 2px;
}
.handle-knot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #8B6914; border: 2px solid #C8A84B; margin: 0 auto;
}
.handle-ring {
  width: 44px; height: 24px; border-radius: 50%;
  border: 4px solid #a93226;
  background: radial-gradient(circle at 40% 35%, #f08080, #c0392b);
  box-shadow: 0 3px 8px rgba(0,0,0,0.25); margin-top: -2px;
}
.pull-label { margin-top: 10px; font-size: 13px; color: #888; letter-spacing: 0.05em; }
.message {
  font-size: 26px; font-weight: bold; color: #1a3a8a; text-align: center; margin-top: 1.2rem;
  opacity: 0; transform: translateY(14px) scale(0.9);
  transition: opacity 0.5s ease 0.55s, transform 0.5s ease 0.55s;
}
.message.show { opacity: 1; transform: translateY(0) scale(1); }
.reset-btn {
  margin-top: 1rem; background: #fff; border: 2.5px solid #1a3a8a; color: #1a3a8a;
  font-size: 16px; font-weight: bold; padding: 11px 32px; border-radius: 32px;
  cursor: pointer; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease 1.1s, background 0.2s, color 0.2s, transform 0.1s;
}
.reset-btn.show { opacity: 1; pointer-events: auto; }
.reset-btn:hover { background: #1a3a8a; color: #fff; }
.reset-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="stage" id="stage">
  <div class="ceiling-rope"></div>
  <div class="kusudama-area" id="kusudamaArea">
    <div class="half left-half" id="leftHalf"><div class="half-inner" id="leftInner"></div></div>
    <div class="half right-half" id="rightHalf"><div class="half-inner" id="rightInner"></div></div>
    <div class="chara-wrap" id="charaWrap"><img id="charaImg" alt=""/></div>
  </div>
  <div class="rope-pull-area" id="pullArea">
    <div class="pull-rope" id="pullRope" style="height:70px;"></div>
    <div class="handle-knot"></div>
    <div class="handle-ring"></div>
    <div class="pull-label" id="pullLabel">引っ張る ↓</div>
  </div>
</div>
<div class="message" id="message">🎉 おめでとうございます！ 🎉</div>
<button class="reset-btn" id="resetBtn">🔄 もう一度！</button>

function buildHalves() {
  ['leftInner','rightInner'].forEach(function(id, idx) {
    var el = document.getElementById(id);
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns,'svg');
    svg.setAttribute('width','240'); svg.setAttribute('height','240');
    svg.setAttribute('viewBox','0 0 240 240');
    var defs = document.createElementNS(ns,'defs');
    var clipId = 'clip'+idx;
    var cp = document.createElementNS(ns,'clipPath'); cp.setAttribute('id',clipId);
    var cc = document.createElementNS(ns,'circle');
    cc.setAttribute('cx','120'); cc.setAttribute('cy','120'); cc.setAttribute('r','115');
    cp.appendChild(cc); defs.appendChild(cp);
    var gid = 'g'+idx;
    var gr = document.createElementNS(ns,'radialGradient'); gr.setAttribute('id',gid);
    gr.setAttribute('cx', idx===0?'38%':'62%'); gr.setAttribute('cy','38%'); gr.setAttribute('r','70%');
    [[0,'#2255cc'],[60,'#1440aa'],[100,'#0a2870']].forEach(function(s){
      var stop=document.createElementNS(ns,'stop');
      stop.setAttribute('offset',s[0]+'%'); stop.setAttribute('stop-color',s[1]); gr.appendChild(stop);
    });
    defs.appendChild(gr); svg.appendChild(defs);
    var bg=document.createElementNS(ns,'circle');
    bg.setAttribute('cx','120'); bg.setAttribute('cy','120'); bg.setAttribute('r','115');
    bg.setAttribute('fill','url(#'+gid+')'); bg.setAttribute('clip-path','url(#'+clipId+')');
    svg.appendChild(bg);
    var g=document.createElementNS(ns,'g');
    g.setAttribute('transform','translate(120,120)'); g.setAttribute('clip-path','url(#'+clipId+')');
    for(var i=0;i<12;i++){
      var e=document.createElementNS(ns,'ellipse');
      e.setAttribute('transform','rotate('+(i*30)+')'); e.setAttribute('cx','0'); e.setAttribute('cy','-58');
      e.setAttribute('rx','11'); e.setAttribute('ry','24'); e.setAttribute('fill','#4a7fd4'); e.setAttribute('opacity','0.3');
      g.appendChild(e);
    }
    svg.appendChild(g);
    var tg=document.createElementNS(ns,'g'); tg.setAttribute('clip-path','url(#'+clipId+')');
    ['大','楠','屋'].forEach(function(ch,ci){
      var ts=document.createElementNS(ns,'text');
      ts.setAttribute('x','122'); ts.setAttribute('y',String(72+ci*46));
      ts.setAttribute('text-anchor','middle'); ts.setAttribute('dominant-baseline','middle');
      ts.setAttribute('font-size','44'); ts.setAttribute('font-weight','bold');
      ts.setAttribute('font-family','serif'); ts.setAttribute('fill','#061850'); ts.setAttribute('opacity','0.5');
      ts.textContent=ch; tg.appendChild(ts);
      var tt=document.createElementNS(ns,'text');
      tt.setAttribute('x','120'); tt.setAttribute('y',String(70+ci*46));
      tt.setAttribute('text-anchor','middle'); tt.setAttribute('dominant-baseline','middle');
      tt.setAttribute('font-size','44'); tt.setAttribute('font-weight','bold');
      tt.setAttribute('font-family','serif'); tt.setAttribute('fill','white'); tt.setAttribute('opacity','0.97');
      tt.textContent=ch; tg.appendChild(tt);
    });
    svg.appendChild(tg);
    var r1=document.createElementNS(ns,'circle');
    r1.setAttribute('cx','120'); r1.setAttribute('cy','120'); r1.setAttribute('r','115');
    r1.setAttribute('fill','none'); r1.setAttribute('stroke','#FFD700'); r1.setAttribute('stroke-width','5');
    svg.appendChild(r1);
    var seam=document.createElementNS(ns,'line');
    seam.setAttribute('x1','120'); seam.setAttribute('y1','5'); seam.setAttribute('x2','120'); seam.setAttribute('y2','235');
    seam.setAttribute('stroke','#FFD700'); seam.setAttribute('stroke-width','2.5'); seam.setAttribute('opacity','0.7');
    svg.appendChild(seam);
    el.appendChild(svg);
  });
}

function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
function setPullRope(p){ pullRope.style.height=(BASE_ROPE+p*MAX_EXTRA)+'px'; }

function onStart(e){
  if(state!=='ready') return;
  isDragging=true; dragStartY=e.touches?e.touches[0].clientY:e.clientY; e.preventDefault();
}
function onMove(e){
  if(!isDragging||state!=='ready') return;
  var cy=e.touches?e.touches[0].clientY:e.clientY;
  var d=cy-dragStartY; if(d<0) return;
  pullAmount=Math.min(d/THRESHOLD,1); setPullRope(pullAmount);
  if(pullAmount>0.3) kusudamaArea.style.transform='translateX('+((Math.random()-0.5)*(pullAmount-0.3)*6)+'px)';
  if(pullAmount>=1){ isDragging=false; triggerBreak(); }
  e.preventDefault();
}
function onEnd(){
  if(!isDragging) return; isDragging=false;
  if(state==='ready'){ pullAmount=0; setPullRope(0); kusudamaArea.style.transform=''; }
}
pullArea.addEventListener('mousedown',onStart,{passive:false});
pullArea.addEventListener('touchstart',onStart,{passive:false});
window.addEventListener('mousemove',onMove,{passive:false});
window.addEventListener('touchmove',onMove,{passive:false});
window.addEventListener('mouseup',onEnd); window.addEventListener('touchend',onEnd);

pullArea.addEventListener('click',function(){
  if(state!=='ready'||isDragging) return;
  var p=0;
  function go(){ p+=0.06; if(p>=1){setPullRope(1);triggerBreak();return;} setPullRope(p);
    if(p>0.3) kusudamaArea.style.transform='translateX('+((Math.random()-0.5)*(p-0.3)*6)+'px)';
    requestAnimationFrame(go); }
  requestAnimationFrame(go);
});

function triggerBreak(){
  if(state!=='ready') return;
  state='breaking'; kusudamaArea.style.transform=''; kusudamaArea.classList.add('shaking');
  playFanfare();
  setTimeout(function(){
    kusudamaArea.classList.remove('shaking');
    pullArea.style.transition='opacity 0.25s'; pullArea.style.opacity='0';
    setTimeout(function(){ pullArea.style.display='none'; },280);
    leftHalf.classList.add('open-left'); rightHalf.classList.add('open-right');
    setTimeout(function(){ charaWrap.classList.add('show'); },180);
    resizeCanvas(); spawnParticles();
    if(animId) cancelAnimationFrame(animId);
    animId=requestAnimationFrame(animate);
    msg.classList.add('show'); resetBtn.classList.add('show'); state='broken';
  },320);
}

    trumpet(G4,1.68,0.10,0.26);trumpet(G4,1.80,0.10,0.26);trumpet(G4,1.92,0.10,0.26);
    trumpet(C5,2.05,0.10,0.26);trumpet(E5,2.17,0.10,0.26);trumpet(G5,2.29,0.10,0.26);trumpet(C6,2.42,0.55,0.38);
    kick(0.00);snare(0.37);kick(0.72);snare(1.20);kick(1.68);kick(1.80);kick(1.92);kick(2.05);snare(2.42);
  }catch(e){}
}

function spawnParticles(){
  var cx=canvas.width*0.5, cy=canvas.height*0.35;
  for(var i=0;i<220;i++){
    var angle=Math.random()*Math.PI*2, speed=4+Math.random()*13, size=6+Math.random()*11;
    particles.push({x:cx+(Math.random()-0.5)*60,y:cy+(Math.random()-0.5)*50,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-5.5,ay:0.18,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      w:size,h:Math.random()>0.4?size*0.38:size,rot:Math.random()*Math.PI*2,
      rv:(Math.random()-0.5)*0.24,alpha:1,isRect:Math.random()>0.38});
  }
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(function(p){return p.alpha>0.02;});
  particles.forEach(function(p){
    p.vy+=p.ay; p.vx*=0.99; p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
    if(p.y>canvas.height*0.96){p.vy*=-0.28; p.y=canvas.height*0.96;}
    p.alpha-=0.005;
    ctx.save(); ctx.globalAlpha=Math.max(p.alpha,0); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
    if(p.isRect) ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    else{ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  if(particles.length>0) animId=requestAnimationFrame(animate);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

resetBtn.addEventListener('click',function(){
  leftHalf.classList.remove('open-left'); rightHalf.classList.remove('open-right');
  charaWrap.classList.remove('show');
  pullArea.style.display=''; pullArea.style.opacity='1'; pullArea.style.transition='';
  pullAmount=0; setPullRope(0);
  msg.classList.remove('show'); resetBtn.classList.remove('show');
  state='ready'; particles=[]; ctx.clearRect(0,0,canvas.width,canvas.height);
  kusudamaArea.style.transform='';
});

window.addEventListener('resize',resizeCanvas);
resizeCanvas();
